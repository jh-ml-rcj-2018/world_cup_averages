  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    color: #1a1a1a;
    padding: 2rem 1.5rem 3rem;

  }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.12);
    padding: 1.25rem 1.25rem 1rem;
    position: relative;
  }
  .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .card-year { font-size: 15px; font-weight: 500; }
  .card-avg { font-size: 13px; color: #888; }
  .card-avg span { font-weight: 500; color: #444; }
  .chart-wrap { position: relative; height: 180px; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 240px;
    z-index: 9999;
    display: none;
  }
  #tooltip .tt-match { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
  #tooltip .tt-score { font-size: 18px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 2px; }
  #tooltip .tt-meta { font-size: 12px; color: #888; }
  #tooltip .tt-avg { font-size: 12px; color: #555; margin-top: 6px; border-top: 0.5px solid #eee; padding-top: 6px; }

  .legend {
    display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-size: 12px; color: #666; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-line { width: 20px; height: 2px; }

  @media (prefers-color-scheme: dark) {
    body { background: #141414; color: #e8e8e8; }
    .card { background: #1f1f1f; border-color: rgba(255,255,255,0.1); }
    .card-avg { color: #777; }
    .card-avg span { color: #bbb; }
    #tooltip { background: #222; border-color: rgba(255,255,255,0.15); color: #e8e8e8; }
    #tooltip .tt-meta { color: #999; }
    #tooltip .tt-avg { color: #aaa; border-top-color: #333; }
    .subtitle { color: #888; }
    .legend { color: #888; }
  }
</style>

const years = [2002,2006,2010,2014,2018,2022,2026];
const COLORS = {
  group: { line:'#3266ad', point:'#3266ad' },
  knockout: { line:'#c2410c', point:'#c2410c' }
};

const byYear = {};
years.forEach(y => {
  byYear[y] = RAW.filter(r => r[1] === y).map(r => ({
    match: r[2],
    phase: r[3],
    team1: r[4],
    team2: r[5],
    s1: r[6],
    s2: r[7],
    goals: r[8],
    cumGoals: r[9],
    avg: r[10]
  }));
});

const grid = document.getElementById('grid');
const tooltip = document.getElementById('tooltip');
const ttMatch = document.getElementById('tt-match');
const ttScore = document.getElementById('tt-score');
const ttMeta = document.getElementById('tt-meta');
const ttAvg = document.getElementById('tt-avg');

let activeTooltipChart = null;

years.forEach(year => {
  const matches = byYear[year];
  const finalAvg = matches[matches.length-1].avg.toFixed(2);
  const isPartial = year === 2026;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-year">${year}${isPartial ? ' <span style="font-size:11px;color:#aaa;font-weight:400">(in progress)</span>' : ''}</span>
      <span class="card-avg">avg <span>${finalAvg}</span> goals/match</span>
    </div>
    <div class="chart-wrap"><canvas id="chart-${year}" role="img" aria-label="Running average goals per match for ${year} World Cup">${year} WC running goal average.</canvas></div>
  `;
  grid.appendChild(card);

  const labels = matches.map(m => `Match ${m.match}`);
  const avgs = matches.map(m => m.avg);
  const phases = matches.map(m => m.phase);
  const pointColors = phases.map(p => p === 'Group Stage' ? COLORS.group.point : COLORS.knockout.point);
  const pointSizes = matches.map(() => 3.5);

  const ctx = document.getElementById(`chart-${year}`).getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: avgs,
        borderColor: '#3266ad',
        borderWidth: 1.5,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: pointSizes,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false,
        segment: {
          borderColor: ctx2 => {
            const i = ctx2.p1DataIndex;
            return phases[i] === 'Group Stage' ? '#3266ad' : '#c2410c';
          }
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: {
          display: false
        },
        y: {
          min: Math.floor(Math.min(...avgs) * 10 - 3) / 10,
          max: Math.ceil(Math.max(...avgs) * 10 + 3) / 10,
          ticks: {
            font: { size: 11 },
            color: '#999',
            maxTicksLimit: 5,
            callback: v => v.toFixed(1)
          },
          grid: { color: 'rgba(128,128,128,0.1)' }
        }
      },
      onHover: (event, elements) => {
        const canvas = event.native.target;
        if (elements.length > 0) {
          const idx = elements[0].index;
          const m = matches[idx];
          canvas.style.cursor = 'crosshair';

          ttMatch.textContent = `${m.team1} vs ${m.team2}`;
          ttScore.textContent = `${m.s1} – ${m.s2}`;
          ttMeta.textContent = `Match ${m.match} · ${m.phase} · ${year}`;
          ttAvg.textContent = `Running avg after this match: ${m.avg.toFixed(2)} goals`;

          const rect = canvas.getBoundingClientRect();
          const x = event.native.clientX;
          const y = event.native.clientY;

          let left = x + 14;
          let top = y - 10;
          tooltip.style.display = 'block';
          const tw = tooltip.offsetWidth;
          const th = tooltip.offsetHeight;
          if (left + tw > window.innerWidth - 8) left = x - tw - 14;
          if (top + th > window.innerHeight - 8) top = y - th + 10;

          tooltip.style.left = left + 'px';
          tooltip.style.top = top + 'px';
        } else {
          canvas.style.cursor = 'default';
          tooltip.style.display = 'none';
        }
      }
    }
  });
});

document.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
